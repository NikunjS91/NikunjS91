name: Refresh Stats Badges

on:
  schedule:
    - cron: "0 */2 * * *"  # Every 2 hours
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Add cache-busting timestamp to stats badges
        run: |
          TIMESTAMP=$(date +%s)
          
          # Update README with timestamp parameter for cache busting
          sed -i "s|github-profile-summary-cards.vercel.app/api/cards/stats?username=NikunjS91&theme=github_dark&cache_seconds=1800&exclude_repo=.*\"|github-profile-summary-cards.vercel.app/api/cards/stats?username=NikunjS91\&theme=github_dark\&cache_seconds=1800\&exclude_repo=\&t=${TIMESTAMP}\"|" README.md
          sed -i "s|github-profile-summary-cards.vercel.app/api/cards/repos-per-language?username=NikunjS91&theme=github_dark&cache_seconds=1800.*\"|github-profile-summary-cards.vercel.app/api/cards/repos-per-language?username=NikunjS91\&theme=github_dark\&cache_seconds=1800\&t=${TIMESTAMP}\"|" README.md
          sed -i "s|streak-stats.demolab.com?user=NikunjS91&theme=dark&hide_border=true&date_format=j%20M%5B%2C%5D%20Y&cache_seconds=1800.*\"|streak-stats.demolab.com?user=NikunjS91\&theme=dark\&hide_border=true\&date_format=j%20M%5B%2C%5D%20Y\&cache_seconds=1800\&t=${TIMESTAMP}\"|" README.md

      - name: Commit updated timestamps
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: refresh stat badge cache [skip ci]"
          git push
