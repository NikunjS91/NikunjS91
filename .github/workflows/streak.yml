name: Generate Streak Card

on:
  schedule:
    - cron: "30 * * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  streak:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate all stat cards from GitHub GraphQL
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USER: ${{ github.repository_owner }}
        run: python scripts/generate_all_stats.py

      - name: Commit updated stat cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/streak.svg assets/stats.svg assets/languages.svg
          git diff --cached --quiet || git commit -m "chore: refresh stat cards"
          git push
