<svg xmlns="http://www.w3.org/2000/svg" width="495" height="195" viewBox="0 0 495 195" role="img" aria-label="GitHub streak stats">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1b27;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#26264d;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="fireGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f7931e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffd23f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="statGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect x="0.5" y="0.5" width="494" height="194" rx="12" fill="url(#bgGradient)" stroke="#667eea" stroke-width="2"/>
  
  <!-- Total Contributions Card -->
  <rect x="15" y="30" width="140" height="140" rx="10" fill="#1f2937" opacity="0.6"/>
  <text x="85" y="85" text-anchor="middle" fill="#ffffff" font-size="36" font-family="Segoe UI, Ubuntu, sans-serif" font-weight="700" filter="url(#glow)">117</text>
  <text x="85" y="110" text-anchor="middle" fill="url(#statGradient)" font-size="13" font-family="Segoe UI, Ubuntu, sans-serif" font-weight="600">Total</text>
  <text x="85" y="125" text-anchor="middle" fill="url(#statGradient)" font-size="13" font-family="Segoe UI, Ubuntu, sans-serif" font-weight="600">Contributions</text>
  <text x="85" y="150" text-anchor="middle" fill="#9ca3af" font-size="10" font-family="Segoe UI, Ubuntu, sans-serif">2025 - Present</text>
  
  <!-- Current Streak Card (Featured) -->
  <rect x="177" y="20" width="140" height="160" rx="10" fill="#1f2937" opacity="0.7"/>
  <circle cx="247" cy="70" r="38" fill="none" stroke="url(#fireGradient)" stroke-width="6" filter="url(#glow)"/>
  <path d="M 247 45 l 6 8 l -3 0 l 0 15 l -6 0 l 0 -15 l -3 0 z" fill="url(#fireGradient)" filter="url(#glow)"/>
  <text x="247" y="115" text-anchor="middle" fill="#ffffff" font-size="40" font-family="Segoe UI, Ubuntu, sans-serif" font-weight="700" filter="url(#glow)">10</text>
  <text x="247" y="137" text-anchor="middle" fill="url(#fireGradient)" font-size="14" font-family="Segoe UI, Ubuntu, sans-serif" font-weight="700">Current Streak</text>
  <text x="247" y="160" text-anchor="middle" fill="#d1d5db" font-size="10" font-family="Segoe UI, Ubuntu, sans-serif">23 Mar 2026</text>
  <text x="247" y="172" text-anchor="middle" fill="#d1d5db" font-size="10" font-family="Segoe UI, Ubuntu, sans-serif">01 Apr 2026</text>
  
  <!-- Longest Streak Card -->
  <rect x="339" y="30" width="140" height="140" rx="10" fill="#1f2937" opacity="0.6"/>
  <text x="409" y="85" text-anchor="middle" fill="#ffffff" font-size="36" font-family="Segoe UI, Ubuntu, sans-serif" font-weight="700" filter="url(#glow)">10</text>
  <text x="409" y="110" text-anchor="middle" fill="url(#statGradient)" font-size="13" font-family="Segoe UI, Ubuntu, sans-serif" font-weight="600">Longest</text>
  <text x="409" y="125" text-anchor="middle" fill="url(#statGradient)" font-size="13" font-family="Segoe UI, Ubuntu, sans-serif" font-weight="600">Streak</text>
  <text x="409" y="145" text-anchor="middle" fill="#9ca3af" font-size="10" font-family="Segoe UI, Ubuntu, sans-serif">23 Mar 2026</text>
  <text x="409" y="157" text-anchor="middle" fill="#9ca3af" font-size="10" font-family="Segoe UI, Ubuntu, sans-serif">01 Apr 2026</text>
</svg>
